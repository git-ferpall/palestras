# Apache — palestras.abrarastro.org
# O app Next.js roda em Node na porta 3000; o Apache faz proxy reverso.
#
# Habilitar módulos (uma vez):
#   sudo a2enmod proxy proxy_http rewrite headers
#   sudo systemctl reload apache2
#
# Instalar o site:
#   sudo cp deploy/apache-palestras.conf /etc/apache2/sites-available/palestras.conf
#   sudo a2ensite palestras.conf
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName palestras.abrarastro.org
    ServerAdmin webmaster@localhost

    # Pasta do projeto (código + .env + banco SQLite)
    DocumentRoot /var/www/palestras.abrarastro.org

    <Directory /var/www/palestras.abrarastro.org>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Impede acesso direto a arquivos sensíveis
    <FilesMatch "^(\.env|\.git)">
        Require all denied
    </FilesMatch>

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    # Next.js (PM2 ou systemd na porta 3000)
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/palestras_error.log
    CustomLog ${APACHE_LOG_DIR}/palestras_access.log combined
</VirtualHost>

# HTTPS (recomendado) — após certbot:
