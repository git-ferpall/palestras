# Apache — palestras.abrarastro.org (HTTP + HTTPS com proxy para Next.js :3000)
#
# sudo a2enmod proxy proxy_http ssl rewrite headers
# sudo cp deploy/apache-palestras.conf /etc/apache2/sites-available/palestras.conf
# sudo a2ensite palestras.conf
# sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Após certbot, mantenha ProxyPass nos blocos :80 e :443.

# HTTP — redireciona para HTTPS
<VirtualHost *:80>
    ServerName palestras.abrarastro.org

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/palestras_error.log
    CustomLog ${APACHE_LOG_DIR}/palestras_access.log combined
</VirtualHost>

# HTTPS — proxy para Node (Next.js)
<VirtualHost *:443>
    ServerName palestras.abrarastro.org
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/palestras.abrarastro.org

    <Directory /var/www/palestras.abrarastro.org>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <FilesMatch "^(\.env|\.git)">
        Require all denied
    </FilesMatch>

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/palestras.abrarastro.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/palestras.abrarastro.org/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/palestras_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/palestras_ssl_access.log combined
</VirtualHost>
